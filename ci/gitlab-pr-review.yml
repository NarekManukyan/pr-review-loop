# pr-review-loop — GitLab CI template.
# Runs /review-pr on merge-request pipelines (each push to the MR). Add the
# contents to .gitlab-ci.yml in the target repo and set ANTHROPIC_API_KEY as a
# masked CI/CD variable. GITLAB_TOKEN needs api scope so /review-pr can post.
pr-review-loop:
  image: node:20
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  variables:
    GIT_DEPTH: "0"                 # full history for diffs / build agent
  before_script:
    - npm install -g @anthropic-ai/claude-code
    - command -v glab >/dev/null || (curl -sL https://gitlab.com/gitlab-org/cli/-/releases/permalink/latest/downloads/glab_$(uname -s)_$(uname -m).tar.gz | tar xz -C /usr/local --strip-components=1 bin/glab)
    - git clone --depth 1 https://github.com/NarekManukyan/pr-review-loop /tmp/prl
    - bash /tmp/prl/install.sh
  script:
    - export ANTHROPIC_API_KEY GITLAB_TOKEN
    - >
      claude -p "/review-pr ${CI_MERGE_REQUEST_PROJECT_URL}/-/merge_requests/${CI_MERGE_REQUEST_IID}"
      --dangerously-skip-permissions
  # Optionally commit .review-memory/ back so memory persists across pipelines
  # (needs a push token; omitted here to keep the template read-only by default).
